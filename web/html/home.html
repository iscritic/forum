<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
    <div class="wrapper">
        <header>
            <nav>
                <a href="/login" class="href">Log in</a>
                <a href="/register" class="href"><button class="sign-button">Sign Up</button></a>
            </nav>
        </header>
        <main>
            <div class="posts">
                {{ range . }}
                <div class="post-container">
                    <a href="/post/{{ .ID }}" class="Post">
                        <div class="post">
                            <h4 class="author">Author: {{ .AuthorID }}</h4>
                            <h2>{{ .Title }}</h2>
                            <p class="date">Creation Date: {{ .CreationDate }}</p>
                            <p>{{ .Content }}</p>
                        </div>
                    </a>
                    <div class="PostLikeForm">
                        <span>
                            <form method="POST" action="/post/like">
                                <input type="hidden" name="post_id" value="{{.ID}}">
                                <button type="submit">❤️ {{.Likes}}</button>
                            </form>
                        </span>
                        <span>
                            <form method="POST" action="/post/dislike">
                                <input type="hidden" name="post_id" value="{{.ID}}">
                                <button type="submit">💔 {{.Dislikes}}</button>
                            </form>
                        </span>
                    </div>
                </div>
                {{ end }}
            </div>
        </main>
        <footer>
            <p>&copy; 2024 Forum</p>
        </footer>
    </div>
</body>
</html>
